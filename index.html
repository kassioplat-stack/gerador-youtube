<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rybb Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F2F2F0;color:#1a1a1a;font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
.container{max-width:480px;margin:0 auto;padding:20px 16px}

/* HEADER */
.header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #E0E0DC}
.logo{font-size:26px;font-weight:900;color:#0D0D0D;letter-spacing:-1px;font-style:italic}
.logo-sub{font-size:11px;font-weight:500;color:#999;letter-spacing:2px;text-transform:uppercase;margin-left:8px}

/* CARDS */
.card{background:#fff;border:1px solid #E8E8E4;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.slbl{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1.2px;display:block;margin-bottom:10px}

/* BOTOES PRIMARIOS */
.btn{width:100%;background:#FF0000;border:none;border-radius:10px;padding:14px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:all .18s;letter-spacing:.2px;position:relative;overflow:hidden;text-decoration:none}
.btn::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:2px;background:rgba(255,255,255,.35);border-radius:1px;transform:scaleX(0);transition:transform .18s}
.btn:not(:disabled):hover::after{transform:scaleX(1)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn:not(:disabled):hover{background:#CC0000;transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,0,0,.25)}
.btn-sec{background:#FF6B00;border:none;color:#fff}
.btn-sec:not(:disabled):hover{background:#E05F00;transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,0,.25)}

/* INPUTS */
textarea{width:100%;background:#FAFAF8;border:1.5px solid #E8E8E4;border-radius:8px;padding:10px;font-size:13px;color:#1a1a1a;font-family:inherit;resize:vertical;min-height:160px;line-height:1.6}
textarea:focus{outline:none;border-color:#FF0000;background:#fff}
textarea::placeholder{color:#C0C0BC}

/* MODEL CARDS */
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.model-card{background:#FAFAF8;border:1.5px solid #E8E8E4;border-radius:10px;padding:12px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.model-card.sel{border-color:#FF0000;background:#fff5f5;box-shadow:0 2px 8px rgba(255,0,0,.1)}
.model-card.sel .mc-name{color:#FF0000}
.mc-icon{font-size:18px;margin-bottom:6px}
.mc-name{font-size:12px;font-weight:700;color:#666}
.mc-desc{font-size:11px;color:#AAA;margin-top:2px}

/* CHIPS */
.chips-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:#FAFAF8;border:1.5px solid #E8E8E4;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;color:#888;cursor:pointer;font-family:inherit;transition:all .15s}
.chip.sel{border-color:#FF0000;color:#FF0000;background:#fff5f5;box-shadow:0 1px 4px rgba(255,0,0,.1)}

/* PROMPTS */
.prompt-item{display:flex;gap:8px;margin-bottom:10px}
.prompt-num{background:#FF0000;color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;flex-shrink:0;height:fit-content;margin-top:4px}
.prompt-ta{width:100%;background:#FAFAF8;border:1.5px solid #E8E8E4;border-radius:6px;padding:8px;font-size:12px;color:#1a1a1a;font-family:inherit;resize:none;height:56px}
.prompt-ta:focus{outline:none;border-color:#FF0000}
.regen-btn{background:transparent;border:1.5px solid #E8E8E4;border-radius:4px;padding:2px 8px;font-size:11px;color:#999;cursor:pointer;font-family:inherit;margin-top:3px;transition:all .15s}
.regen-btn:hover{border-color:#FF0000;color:#FF0000}

/* STEPS */
.step-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0F0EC}
.step-item:last-child{border-bottom:none}
.step-dot{width:22px;height:22px;border-radius:50%;background:#F0F0EC;display:flex;align-items:center;justify-content:center;font-size:10px;color:#AAA;flex-shrink:0;font-weight:700}
.step-dot.active{background:#FF0000;color:#fff}
.step-dot.done{background:#22c55e;color:#fff}
.step-dot.error{background:#e53935;color:#fff}
.step-label{font-size:12px;color:#1a1a1a;font-weight:500}
.step-msg{font-size:11px;color:#AAA;margin-top:1px}
.prog-bar{height:3px;background:#F0F0EC;border-radius:2px;margin-bottom:14px}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#FF0000,#FF6B00);border-radius:2px;transition:width .4s}

/* IMAGENS */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.img-cell{aspect-ratio:9/16;background:#F0F0EC;border-radius:8px;overflow:hidden}
.img-cell img{width:100%;height:100%;object-fit:cover;display:none}

/* TABS */
.tab-row{display:flex;gap:6px;margin-bottom:20px;background:#E8E8E4;border-radius:10px;padding:3px}
.tab-btn{flex:1;background:transparent;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:600;color:#888;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn.sel{background:#fff;color:#FF0000;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* INFO ROW */
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <span class="logo">Rybb</span><span class="logo-sub">Studio</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab-btn sel" id="tab-btn-gerar" onclick="showTab('gerar')">YouTube</button>
    <button class="tab-btn" id="tab-btn-thumb" onclick="showTab('thumb')">Vídeos Comerciais</button>
  </div>

  <!-- ABA GERAR -->
  <div id="tab-gerar">

    <!-- Modelo -->
    <div class="card">
      <span class="slbl">Modelo de conteúdo</span>
      <div class="model-grid">
        <button class="model-card sel" id="m-animais" onclick="selModel('animais')">
          <div class="mc-icon">🐾</div>
          <div class="mc-name">Animal</div>
          <div class="mc-desc">Field journal naturalista</div>
        </button>
        <button class="model-card" id="m-mente" onclick="selModel('mente')">
          <div class="mc-icon">🧠</div>
          <div class="mc-name">Mente</div>
          <div class="mc-desc">Personagem azul 3D</div>
        </button>
      </div>
    </div>

    <!-- Formato -->
    <div class="card">
      <span class="slbl">Formato</span>
      <div class="chips-row">
        <button class="chip sel" id="f916" onclick="selChip('formato','9:16')">9:16</button>
        <button class="chip" id="f169" onclick="selChip('formato','16:9')">16:9</button>
        <button class="chip" id="f11" onclick="selChip('formato','1:1')">1:1</button>
      </div>
    </div>

    <!-- Script -->
    <div class="card">
      <div class="info-row">
        <span class="slbl" style="margin:0">Script de narração</span>
        <span id="char-count" style="font-size:11px;color:#AAA;font-weight:500">0 palavras</span>
      </div>
      <textarea id="script-final" placeholder="Cole aqui o script completo da narração..." oninput="atualizarContador()"></textarea>
    </div>

    <!-- Btn Prompts -->
    <button class="btn" id="btn-prompts" onclick="gerarPrompts()" style="margin-bottom:12px">1. Gerar Prompts de Imagem</button>

    <!-- Botões de ação -->
    <button class="btn btn-sec" id="btn-narracao" onclick="gerarNarracao()" style="margin-bottom:12px" disabled>2. Gerar Narração</button>
    <button class="btn btn-sec" id="btn-imagens" onclick="gerarImagens()" style="margin-bottom:12px" disabled>3. Gerar Imagens</button>

    <!-- Prompts -->
    <div id="section-prompts" style="display:none">
      <div class="card">
        <span class="slbl">Prompts de imagem</span>
        <div id="prompts-list"></div>
      </div>
    </div>

    <!-- Narração gerada -->
    <div id="section-narracao" class="card" style="display:none;margin-bottom:12px">
      <span class="slbl">Narração gerada</span>
      <audio id="audio-player" controls style="width:100%;margin-top:6px"></audio>
    </div>

    <!-- Steps -->
    <div id="steps-card" class="card" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="progress"></div></div>
      <div class="step-item">
        <div class="step-dot" id="s1">1</div>
        <div><div class="step-label">Imagens - Leonardo</div><div class="step-msg" id="msg1">Aguardando...</div></div>
      </div>
      <div class="step-item">
        <div class="step-dot" id="s2">2</div>
        <div><div class="step-label">Narração - ElevenLabs</div><div class="step-msg" id="msg2">Aguardando...</div></div>
      </div>
      <div class="step-item">
        <div class="step-dot" id="s3">3</div>
        <div><div class="step-label">ZIP</div><div class="step-msg" id="msg3">Aguardando...</div></div>
      </div>
    </div>

    <!-- Resultado -->
    <div id="result-card" style="display:none">

    </div>

    <!-- Imagens geradas -->
    <div id="section-imagens" class="card" style="display:none;margin-bottom:12px">
      <span class="slbl">Imagens geradas</span>
      <div class="img-grid" id="image-grid"></div>
    </div>

    <!-- Download -->
    <button class="btn" id="btn-download" onclick="baixarZip()" style="display:none;margin-bottom:12px">⬇ Baixar Projeto (ZIP)</button>

    <!-- Novo vídeo -->
    <div style="text-align:center;margin-top:8px">
      <button onclick="novoVideo()" style="background:transparent;border:1.5px solid #E0E0DC;border-radius:8px;padding:8px 20px;font-size:12px;font-weight:600;color:#999;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:underline;text-underline-offset:3px;text-decoration-color:transparent;" onmouseover="this.style.textDecorationColor='#ccc'" onmouseout="this.style.textDecorationColor='transparent'">+ Novo Vídeo</button>
    </div>

  </div><!-- /tab-gerar -->

  <!-- ABA VIDEOS COMERCIAIS -->
  <div id="tab-thumb" style="display:none">
  </div>

</div><!-- /container -->

<script>
var _processando = false;

function bloquearBotoes() {
  _processando = true;
  ['btn-prompts','btn-narracao','btn-imagens'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.style.pointerEvents = 'none';
  });
}

function liberarBotoes() {
  _processando = false;
  ['btn-prompts','btn-narracao','btn-imagens'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.style.pointerEvents = '';
  });
}

var state = {
  modelo: 'animais',
  formato: '9:16',
  prompts: [],
  sessionId: null,
  zipPath: null
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTab(tab) {
  document.getElementById('tab-gerar').style.display = tab==='gerar' ? 'block' : 'none';
  document.getElementById('tab-thumb').style.display = tab==='thumb' ? 'block' : 'none';
  document.getElementById('tab-btn-gerar').classList.toggle('sel', tab==='gerar');
  document.getElementById('tab-btn-thumb').classList.toggle('sel', tab==='thumb');
}

function selModel(val) {
  state.modelo = val;
  ['animais','mente'].forEach(function(m){
    document.getElementById('m-'+m).classList.toggle('sel', m===val);
  });
  salvarEstado();
}

function selChip(key, val) {
  state[key] = val;
  var map = {'9:16':'f916','16:9':'f169','1:1':'f11'};
  Object.values(map).forEach(function(id){ var el=document.getElementById(id); if(el) el.classList.remove('sel'); });
  var selId = map[val];
  if(selId) { var el=document.getElementById(selId); if(el) el.classList.add('sel'); }
  salvarEstado();
}

function setBtnLoading(id, loading, normalText, loadingText) {
  var btn = document.getElementById(id);
  if(!btn) return;
  btn.disabled = loading;
  btn.textContent = loading ? (loadingText||'Aguardando...') : normalText;
}

function setStep(n, status, msg) {
  var dot = document.getElementById('s'+n);
  var msgEl = document.getElementById('msg'+n);
  if(dot) {
    dot.className = 'step-dot' + (status==='done' ? ' done' : status==='active' ? ' active' : status==='error' ? ' error' : '');
    dot.textContent = status==='done' ? '✓' : String(n);
  }
  if(msgEl && msg) msgEl.textContent = msg;
}

function setP(pct) {
  var el = document.getElementById('progress');
  if(el) el.style.width = pct + '%';
}

function atualizarContador() {
  var sf = document.getElementById('script-final');
  var cc = document.getElementById('char-count');
  if(!sf || !cc) return;
  var txt = sf.value.trim();
  var palavras = txt ? txt.split(/\s+/).length : 0;
  var duracao_s = Math.round(palavras * 0.45);
  var n = Math.max(Math.round(duracao_s / 2), 0);
  cc.textContent = palavras + ' palavras · ~' + duracao_s + 's · ' + n + ' imagens';
}

function renderPrompts(prompts) {
  var el = document.getElementById('prompts-list');
  if(!el) return;
  var html = '';
  prompts.forEach(function(p, i) {
    html += '<div class="prompt-item">'
      + '<span class="prompt-num">' + (i+1) + '</span>'
      + '<div style="flex:1">'
      + '<textarea class="prompt-ta" id="pt'+i+'">' + esc(p) + '</textarea>'
      + '<button class="regen-btn" onclick="regenPrompt('+i+')">↻ Regenerar</button>'
      + '</div></div>';
  });
  el.innerHTML = html;
}

function renderGrid(total) {
  var grid = document.getElementById('image-grid');
  if(!grid) return;
  var html = '';
  for(var i=0;i<total;i++) {
    html += '<div class="img-cell" id="cell'+i+'"><img id="img-'+i+'"></div>';
  }
  grid.innerHTML = html;
}

async function gerarPrompts() {
  var script = (document.getElementById('script-final')||{}).value || '';
  if(!script.trim()) { alert('Cole o script primeiro'); return; }
  setBtnLoading('btn-prompts', true, '1. Gerar Prompts de Imagem', 'Gerando...');
  var palavras = script.trim().split(/\s+/).length;
  var duracao_s = Math.round(palavras * 0.45);
  var n_prompts = Math.max(Math.round(duracao_s / 2), 5);
  try {
    var r = await fetch('/gerar-prompts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({script:script, modelo:state.modelo, formato:state.formato, n_prompts:n_prompts, duracao:String(duracao_s)})
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);
    state.prompts = d.prompts || [];
    renderPrompts(state.prompts);
    document.getElementById('section-prompts').style.display = 'block';
    document.getElementById('btn-narracao').disabled = false;
    salvarEstado();
  } catch(e) { alert('Erro ao gerar prompts: ' + e.message); }
  setBtnLoading('btn-prompts', false, '1. Gerar Prompts de Imagem');
}

async function regenPrompt(i) {
  var ta = document.getElementById('pt'+i);
  if(!ta) return;
  ta.disabled = true;
  try {
    var r = await fetch('/regenerar-prompt', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt_atual: ta.value, modelo: state.modelo})
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);
    ta.value = d.prompt;
    state.prompts[i] = d.prompt;
    salvarEstado();
  } catch(e) { alert('Erro: ' + e.message); }
  ta.disabled = false;
}

async function gerarNarracao() {
  var script = (document.getElementById('script-final')||{}).value||'';
  if(!script.trim()){ alert('Cole o script primeiro'); return; }
  bloquearBotoes();
  setBtnLoading('btn-narracao', true, '2. Gerar Narração', 'Gerando narração...');
  try {
    var r = await fetch('/audio-gerar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({script: script})
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);
    state.sessionId = d.session_id;
    state.narracao_session_id = d.session_id;
    var ap = document.getElementById('audio-player');
    if(ap) ap.src = '/audio/' + d.session_id + '?t=' + Date.now();
    document.getElementById('section-narracao').style.display = 'block';
    document.getElementById('btn-imagens').disabled = false;
    salvarEstado();
  } catch(e) {
    alert('Erro ao gerar narração: ' + e.message);
  }
  setBtnLoading('btn-narracao', false, '2. Gerar Narração');
  liberarBotoes();
}

async function gerarImagens() {
  state.prompts.forEach(function(p,i){ var ta=document.getElementById('pt'+i); if(ta) state.prompts[i]=ta.value; });
  if(!state.prompts.length){ alert('Gere os prompts primeiro'); return; }

  document.getElementById('steps-card').style.display = 'block';
  document.getElementById('btn-imagens').disabled = true;
  setP(5); setStep(1,'active','Iniciando geração...'); setStep(2,'','Aguardando...'); setStep(3,'','Aguardando...');

  try {
    // Inicia geração em background — retorna imediatamente com session_id
    var r = await fetch('/imagens-gerar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        prompts: state.prompts,
        narracao_session_id: state.narracao_session_id || '',
        formato: state.formato,
        modelo: state.modelo
      })
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);

    var imgSid = d.session_id;
    var total = d.total;
    state.sessionId = imgSid;

    // Prepara grid vazia
    renderGrid(total);
    document.getElementById('section-imagens').style.display = 'block';

    // Polling a cada 5s até concluir
    var imgsJaMostradas = {};
    await new Promise(function(resolve, reject) {
      var intervalo = setInterval(async function() {
        try {
          var rs = await fetch('/imagens-status/' + imgSid);
          var st = await rs.json();
          if(st.erro) { clearInterval(intervalo); reject(new Error(st.erro)); return; }

          var pct = Math.round(5 + (st.imagens_ok / Math.max(st.total, 1)) * 60);
          setP(pct);
          setStep(1, 'active', st.imagens_ok + '/' + st.total + ' imagens geradas...');

          // Mostra imagens conforme chegam
          for(var i = 0; i < st.imagens_ok; i++) {
            if(!imgsJaMostradas[i]) {
              var img = document.getElementById('img-'+i);
              if(img) { img.src = '/imagem/'+imgSid+'/'+i+'?t='+Date.now(); img.style.display = 'block'; }
              imgsJaMostradas[i] = true;
            }
          }

          if(st.status === 'concluido') {
            clearInterval(intervalo);
            // Mostra imagens restantes que possam ter chegado no último ciclo
            for(var j = 0; j < st.total; j++) {
              if(!imgsJaMostradas[j]) {
                var img2 = document.getElementById('img-'+j);
                if(img2) { img2.src = '/imagem/'+imgSid+'/'+j+'?t='+Date.now(); img2.style.display = 'block'; }
              }
            }
            resolve(st);
          }
        } catch(err) {
          clearInterval(intervalo);
          reject(err);
        }
      }, 5000);
    }).then(function(st) {
      var nOk = st.imagens_ok;
      setStep(1, 'done', nOk + '/' + st.total + ' imagens geradas' + (st.erros.length ? ' (' + st.erros.length + ' erros)' : ''));
      setP(75);
      setStep(2, 'done', 'Narração reutilizada');
      setP(90);
      setStep(3, 'done', 'Pronto!');
      setP(100);
      state.zipPath = st.zip;
      document.getElementById('btn-download').style.display = 'block';
      salvarEstado();
    });

  } catch(e) { alert('Erro ao gerar imagens: ' + e.message); }
  document.getElementById('btn-imagens').disabled = false;
}


function baixarZip() {
  if(state.sessionId) window.open('/download?session_id='+state.sessionId);
  else if(state.zipPath) window.open('/download?file='+encodeURIComponent(state.zipPath));
  else alert('ZIP ainda não disponível.');
}

function salvarEstado() {
  try { localStorage.setItem('yt_v2', JSON.stringify(state)); } catch(e){}
}

function restaurarEstado() {
  try {
    var s = JSON.parse(localStorage.getItem('yt_v2')||'null');
    if(!s) return;
    if(s.modelo) selModel(s.modelo);
    if(s.formato) selChip('formato', s.formato);
    if(s.prompts && s.prompts.length) {
      state.prompts = s.prompts;
      renderPrompts(s.prompts);
      document.getElementById('section-prompts').style.display = 'block';
      var bi = document.getElementById('btn-imagens');
      if(bi) bi.disabled = false;
    }
    if(s.sessionId) state.sessionId = s.sessionId;
    if(s.narracao_session_id) state.narracao_session_id = s.narracao_session_id;
    if(s.zipPath) {
      state.zipPath = s.zipPath;
      document.getElementById('btn-download').style.display = 'block';
      document.getElementById('result-card').style.display = 'block';
    }
  } catch(e) { console.log('restaurar:', e); }
}

function novoVideo() {
  if(!confirm('Iniciar novo vídeo? O progresso atual será perdido.')) return;
  localStorage.removeItem('yt_v2');
  state = {modelo:'animais', formato:'9:16', prompts:[], sessionId:null, narracao_session_id:null, zipPath:null};
  document.getElementById('script-final').value = '';
  document.getElementById('section-prompts').style.display = 'none';
  document.getElementById('steps-card').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('btn-download').style.display = 'none';
  document.getElementById('image-grid').innerHTML = '';
  atualizarContador();
  selModel('animais');
  selChip('formato','9:16');
}

document.addEventListener('DOMContentLoaded', function() {
  restaurarEstado();
  atualizarContador();
});
</script>
</body>
</html>
