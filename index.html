<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rybb Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0E0E1A;color:#E8E8FF;font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
.container{max-width:520px;margin:0 auto;padding:24px 16px}

/* HEADER */
.header{display:flex;align-items:center;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #1E1E35}
.logo{font-size:22px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase}
.logo-sub{font-size:11px;font-weight:600;color:#7B5EFF;letter-spacing:3px;text-transform:uppercase;margin-left:10px}
.logo-tag{font-size:11px;color:#555577;margin-top:2px}

/* CARDS */
.card{background:#151525;border:1px solid #1E1E35;border-radius:16px;padding:18px;margin-bottom:12px}
.slbl{font-size:10px;font-weight:700;color:#555577;text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:12px}

/* BOTOES PRIMARIOS */
.btn{width:100%;background:linear-gradient(135deg,#7B5EFF,#5B3EDF);border:none;border-radius:12px;padding:15px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:all .18s;letter-spacing:.3px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:2px;background:rgba(255,255,255,.3);border-radius:1px;transform:scaleX(0);transition:transform .18s}
.btn:not(:disabled):hover::after{transform:scaleX(1)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn:not(:disabled):hover{background:linear-gradient(135deg,#8B6EFF,#6B4EEF);transform:translateY(-1px);box-shadow:0 6px 20px rgba(123,94,255,.35)}
.btn-sec{background:#1E1E35;border:1px solid #2A2A45;color:#8888BB}
.btn-sec:not(:disabled):hover{background:#252540;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}

/* INPUTS */
textarea{width:100%;background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:10px;padding:12px;font-size:13px;color:#E8E8FF;font-family:inherit;resize:vertical;min-height:160px;line-height:1.6}
textarea:focus{outline:none;border-color:#7B5EFF;background:#111122}
textarea::placeholder{color:#333355}

/* MODEL CARDS */
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.model-card{background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:14px;padding:16px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:12px}
.model-card.sel{border-color:#7B5EFF;background:#13132A;box-shadow:0 0 0 1px #7B5EFF33}
.model-card.sel .mc-name{color:#fff}
.mc-icon{font-size:22px;background:#1E1E35;border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.model-card.sel .mc-icon{background:#2A1E55}
.mc-info{flex:1}
.mc-name{font-size:13px;font-weight:700;color:#8888BB}
.mc-desc{font-size:11px;color:#444466;margin-top:3px}

/* CHIPS */
.chips-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;color:#555577;cursor:pointer;font-family:inherit;transition:all .15s}
.chip.sel{border-color:#7B5EFF;color:#7B5EFF;background:#13132A}

/* PROMPTS */
.prompt-item{display:flex;gap:8px;margin-bottom:10px}
.prompt-num{background:#7B5EFF;color:#fff;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;flex-shrink:0;height:fit-content;margin-top:4px}
.prompt-ta{width:100%;background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:8px;padding:8px;font-size:12px;color:#E8E8FF;font-family:inherit;resize:none;height:56px}
.prompt-ta:focus{outline:none;border-color:#7B5EFF}
.regen-btn{background:transparent;border:1.5px solid #1E1E35;border-radius:5px;padding:2px 8px;font-size:11px;color:#444466;cursor:pointer;font-family:inherit;margin-top:3px;transition:all .15s}
.regen-btn:hover{border-color:#7B5EFF;color:#7B5EFF}

/* STEPS */
.step-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #111122}
.step-item:last-child{border-bottom:none}
.step-dot{width:24px;height:24px;border-radius:50%;background:#1E1E35;display:flex;align-items:center;justify-content:center;font-size:10px;color:#444466;flex-shrink:0;font-weight:700}
.step-dot.active{background:#7B5EFF;color:#fff}
.step-dot.done{background:#22c55e;color:#fff}
.step-dot.error{background:#e53935;color:#fff}
.step-label{font-size:12px;color:#E8E8FF;font-weight:500}
.step-msg{font-size:11px;color:#444466;margin-top:1px}
.prog-bar{height:3px;background:#1E1E35;border-radius:2px;margin-bottom:16px}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#7B5EFF,#5B3EDF);border-radius:2px;transition:width .4s}

/* IMAGENS */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.img-cell{aspect-ratio:9/16;background:#1E1E35;border-radius:10px;overflow:hidden}
.img-cell img{width:100%;height:100%;object-fit:cover;display:none}

/* TABS */
.tab-row{display:flex;gap:4px;margin-bottom:24px;background:#111122;border-radius:14px;padding:4px;border:1px solid #1E1E35}
.tab-btn{flex:1;background:transparent;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:#444466;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn.sel{background:linear-gradient(135deg,#7B5EFF,#5B3EDF);color:#fff;box-shadow:0 2px 12px rgba(123,94,255,.3)}

/* INFO ROW */
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* COMERCIAL */
.cena-card{background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:14px;padding:16px;margin-bottom:14px}
.cena-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cena-num{background:linear-gradient(135deg,#7B5EFF,#5B3EDF);color:#fff;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.cena-title{font-size:12px;font-weight:700;color:#8888BB;flex:1}
.cena-section{margin-bottom:10px}
.cena-label{font-size:10px;font-weight:700;color:#444466;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block}
.cena-ta{width:100%;background:#151525;border:1.5px solid #1E1E35;border-radius:8px;padding:8px;font-size:12px;color:#E8E8FF;font-family:inherit;resize:none;line-height:1.5}
.cena-ta:focus{outline:none;border-color:#7B5EFF}
.cena-img{width:100%;aspect-ratio:9/16;background:#1E1E35;border-radius:10px;overflow:hidden;margin-bottom:6px;display:flex;align-items:center;justify-content:center}
.cena-img img{width:100%;height:100%;object-fit:cover;display:none}
.cena-img-placeholder{font-size:28px;color:#333355}
.cena-video{width:100%;background:#1E1E35;border-radius:10px;overflow:hidden;margin-bottom:6px;min-height:60px;display:flex;align-items:center;justify-content:center}
.cena-video video{width:100%;border-radius:10px;display:none}
.cena-video-placeholder{font-size:11px;color:#333355}
.cena-actions{display:flex;gap:6px;flex-wrap:wrap}
.cena-btn{background:#1E1E35;border:1.5px solid #2A2A45;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:#7B5EFF;cursor:pointer;font-family:inherit;transition:all .15s}
.cena-btn:hover{background:#252540;border-color:#7B5EFF}
.cena-btn:disabled{opacity:.3;cursor:not-allowed}
.com-input{width:100%;background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:8px;padding:10px;font-size:13px;color:#E8E8FF;font-family:inherit;margin-bottom:8px}
.com-input:focus{outline:none;border-color:#7B5EFF}
.estilo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.estilo-card{background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.estilo-card.sel{border-color:#7B5EFF;background:#13132A}
.estilo-card.sel .estilo-nome{color:#7B5EFF}
.estilo-nome{font-size:12px;font-weight:700;color:#8888BB}
.estilo-desc{font-size:10px;color:#444466;margin-top:2px}
.voz-row{display:flex;gap:8px;flex-wrap:wrap}
.voz-chip{background:#0E0E1A;border:1.5px solid #1E1E35;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;color:#555577;cursor:pointer;font-family:inherit;transition:all .15s}
.voz-chip.sel{border-color:#7B5EFF;color:#7B5EFF;background:#13132A}
.status-bar{font-size:11px;color:#7B5EFF;padding:8px 0;min-height:20px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <span class="logo">RYBB</span><span class="logo-sub">Studio</span>
    </div>
    <div style="font-size:11px;color:#333355">Create viral content at scale.</div>
  </div>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab-btn sel" id="tab-btn-gerar" onclick="showTab('gerar')">YouTube</button>
    <button class="tab-btn" id="tab-btn-thumb" onclick="showTab('thumb')">Vídeos Comerciais</button>
  </div>

  <!-- ABA GERAR -->
  <div id="tab-gerar">

    <!-- Modelo -->
    <div class="card">
      <span class="slbl">Modelo de conteúdo</span>
      <div class="model-grid">
        <button class="model-card sel" id="m-animais" onclick="selModel('animais')">
          <div class="mc-icon">🐾</div>
          <div class="mc-info"><div class="mc-name">Animal</div><div class="mc-desc">Field journal naturalista</div></div>
        </button>
        <button class="model-card" id="m-mente" onclick="selModel('mente')">
          <div class="mc-icon">🧠</div>
          <div class="mc-info"><div class="mc-name">Mente</div><div class="mc-desc">Personagem azul 3D</div></div>
        </button>
      </div>
    </div>

    <!-- Formato -->
    <div class="card">
      <span class="slbl">Formato</span>
      <div class="chips-row">
        <button class="chip sel" id="f916" onclick="selChip('formato','9:16')">9:16</button>
        <button class="chip" id="f169" onclick="selChip('formato','16:9')">16:9</button>
        <button class="chip" id="f11" onclick="selChip('formato','1:1')">1:1</button>
      </div>
    </div>

    <!-- Script -->
    <div class="card">
      <div class="info-row">
        <span class="slbl" style="margin:0">Script de narração</span>
        <span id="char-count" style="font-size:11px;color:#444466;font-weight:500">0 palavras</span>
      </div>
      <textarea id="script-final" placeholder="Cole aqui o script completo da narração..." oninput="atualizarContador()"></textarea>
    </div>

    <!-- Btn Prompts -->
    <button class="btn" id="btn-prompts" onclick="gerarPrompts()" style="margin-bottom:12px">1. Gerar Prompts de Imagem</button>

    <!-- Botões de ação -->
    <button class="btn btn-sec" id="btn-narracao" onclick="gerarNarracao()" style="margin-bottom:12px" disabled>2. Gerar Narração</button>
    <button class="btn btn-sec" id="btn-imagens" onclick="gerarImagens()" style="margin-bottom:12px" disabled>3. Gerar Imagens</button>

    <!-- Prompts -->
    <div id="section-prompts" style="display:none">
      <div class="card">
        <span class="slbl">Prompts de imagem</span>
        <div id="prompts-list"></div>
      </div>
    </div>

    <!-- Narração gerada -->
    <div id="section-narracao" class="card" style="display:none;margin-bottom:12px">
      <span class="slbl">Narração gerada</span>
      <audio id="audio-player" controls style="width:100%;margin-top:6px"></audio>
    </div>

    <!-- Steps -->
    <div id="steps-card" class="card" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="progress"></div></div>
      <div class="step-item">
        <div class="step-dot" id="s1">1</div>
        <div><div class="step-label">Imagens - Leonardo</div><div class="step-msg" id="msg1">Aguardando...</div></div>
      </div>
      <div class="step-item">
        <div class="step-dot" id="s2">2</div>
        <div><div class="step-label">Narração - ElevenLabs</div><div class="step-msg" id="msg2">Aguardando...</div></div>
      </div>
      <div class="step-item">
        <div class="step-dot" id="s3">3</div>
        <div><div class="step-label">ZIP</div><div class="step-msg" id="msg3">Aguardando...</div></div>
      </div>
    </div>

    <!-- Resultado -->
    <div id="result-card" style="display:none">

    </div>

    <!-- Imagens geradas -->
    <div id="section-imagens" class="card" style="display:none;margin-bottom:12px">
      <span class="slbl">Imagens geradas</span>
      <div class="img-grid" id="image-grid"></div>
    </div>

    <!-- Download -->
    <button class="btn" id="btn-download" onclick="baixarZip()" style="display:none;margin-bottom:12px">⬇ Baixar Projeto (ZIP)</button>

    <!-- Novo vídeo -->
    <div style="text-align:center;margin-top:8px">
      <button onclick="novoVideo()" style="background:transparent;border:1.5px solid #E0E0DC;border-radius:8px;padding:8px 20px;font-size:12px;font-weight:600;color:#999;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:underline;text-underline-offset:3px;text-decoration-color:transparent;" onmouseover="this.style.textDecorationColor='#ccc'" onmouseout="this.style.textDecorationColor='transparent'">+ Novo Vídeo</button>
    </div>

  </div><!-- /tab-gerar -->

  <!-- ABA VIDEOS COMERCIAIS -->
  <div id="tab-thumb" style="display:none">

    <!-- INPUT -->
    <div class="card">
      <span class="slbl">Informações do vídeo</span>
      <input class="com-input" id="com-titulo" placeholder="Título do vídeo (ex: Barbearia do João — Corte Perfeito)" />
      <input class="com-input" id="com-segmento" placeholder="Segmento / Negócio (ex: Barbearia, Restaurante, Curso Online)" />
      <textarea class="com-input" id="com-descricao" style="min-height:80px;resize:vertical" placeholder="Descreva a ideia do vídeo, o que quer comunicar, público-alvo..."></textarea>
    </div>

    <!-- ESTILO VISUAL -->
    <div class="card">
      <span class="slbl">Estilo visual</span>
      <div class="estilo-grid" id="estilo-grid">
        <button class="estilo-card sel" id="estilo-realista" onclick="comSelEstilo('realista')">
          <div class="estilo-nome">Realista</div>
          <div class="estilo-desc">Fotorrealista, cinematográfico</div>
        </button>
        <button class="estilo-card" id="estilo-3d" onclick="comSelEstilo('3d')">
          <div class="estilo-nome">3D</div>
          <div class="estilo-desc">Render 3D moderno, minimalista</div>
        </button>
        <button class="estilo-card" id="estilo-desenho" onclick="comSelEstilo('desenho')">
          <div class="estilo-nome">Desenho</div>
          <div class="estilo-desc">Ilustração vetorial, colorido</div>
        </button>
        <button class="estilo-card" id="estilo-cinematic" onclick="comSelEstilo('cinematic')">
          <div class="estilo-nome">Cinematic</div>
          <div class="estilo-desc">Filmático, cores ricas, profundo</div>
        </button>
      </div>
    </div>

    <!-- VOZ -->
    <div class="card">
      <span class="slbl">Voz da narração</span>
      <div class="voz-row" id="voz-row">
        <button class="voz-chip sel" id="voz-ArxqHrvFUTpvtCvw3KVh" onclick="comSelVoz('ArxqHrvFUTpvtCvw3KVh')">Kássio</button>
      </div>
    </div>

    <!-- GERAR ROTEIRO -->
    <button class="btn" id="btn-com-roteiro" onclick="comGerarRoteiro()" style="margin-bottom:12px">✦ Gerar Roteiro de Cenas</button>

    <!-- STATUS -->
    <div class="status-bar" id="com-status"></div>

    <!-- CENAS -->
    <div id="com-cenas"></div>

    <!-- ACOES GLOBAIS -->
    <div id="com-acoes" style="display:none">
      <button class="btn" id="btn-com-tudo" onclick="comGerarTudo()" style="margin-bottom:12px">⚡ Gerar Tudo (Imagens + Vídeos + Narração)</button>
      <button class="btn btn-sec" id="btn-com-narracao" onclick="comGerarNarracao()" style="margin-bottom:12px">🎙 Gerar Só Narração</button>
      <audio id="com-audio-player" controls style="width:100%;margin-bottom:12px;display:none"></audio>
      <button class="btn" id="btn-com-download" onclick="comBaixar()" style="display:none;margin-bottom:12px">⬇ Baixar ZIP (Vídeos + Narração)</button>
      <div style="text-align:center;margin-top:8px">
        <button onclick="comNovo()" style="background:transparent;border:1.5px solid #1E1E35;border-radius:8px;padding:8px 20px;font-size:12px;font-weight:600;color:#444466;cursor:pointer;font-family:inherit">+ Novo Projeto</button>
      </div>
    </div>

  </div>

</div><!-- /container -->

<script>
var _processando = false;

function bloquearBotoes() {
  _processando = true;
  ['btn-prompts','btn-narracao','btn-imagens'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.style.pointerEvents = 'none';
  });
}

function liberarBotoes() {
  _processando = false;
  ['btn-prompts','btn-narracao','btn-imagens'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.style.pointerEvents = '';
  });
}

var state = {
  modelo: 'animais',
  formato: '9:16',
  prompts: [],
  sessionId: null,
  zipPath: null
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTab(tab) {
  document.getElementById('tab-gerar').style.display = tab==='gerar' ? 'block' : 'none';
  document.getElementById('tab-thumb').style.display = tab==='thumb' ? 'block' : 'none';
  document.getElementById('tab-btn-gerar').classList.toggle('sel', tab==='gerar');
  document.getElementById('tab-btn-thumb').classList.toggle('sel', tab==='thumb');
}

function selModel(val) {
  state.modelo = val;
  ['animais','mente'].forEach(function(m){
    document.getElementById('m-'+m).classList.toggle('sel', m===val);
  });
  salvarEstado();
}

function selChip(key, val) {
  state[key] = val;
  var map = {'9:16':'f916','16:9':'f169','1:1':'f11'};
  Object.values(map).forEach(function(id){ var el=document.getElementById(id); if(el) el.classList.remove('sel'); });
  var selId = map[val];
  if(selId) { var el=document.getElementById(selId); if(el) el.classList.add('sel'); }
  salvarEstado();
}

function setBtnLoading(id, loading, normalText, loadingText) {
  var btn = document.getElementById(id);
  if(!btn) return;
  btn.disabled = loading;
  btn.textContent = loading ? (loadingText||'Aguardando...') : normalText;
}

function setStep(n, status, msg) {
  var dot = document.getElementById('s'+n);
  var msgEl = document.getElementById('msg'+n);
  if(dot) {
    dot.className = 'step-dot' + (status==='done' ? ' done' : status==='active' ? ' active' : status==='error' ? ' error' : '');
    dot.textContent = status==='done' ? '✓' : String(n);
  }
  if(msgEl && msg) msgEl.textContent = msg;
}

function setP(pct) {
  var el = document.getElementById('progress');
  if(el) el.style.width = pct + '%';
}

function atualizarContador() {
  var sf = document.getElementById('script-final');
  var cc = document.getElementById('char-count');
  if(!sf || !cc) return;
  var txt = sf.value.trim();
  var palavras = txt ? txt.split(/\s+/).length : 0;
  var duracao_s = Math.round(palavras * 0.45);
  var n = Math.max(Math.round(duracao_s / 2), 0);
  cc.textContent = palavras + ' palavras · ~' + duracao_s + 's · ' + n + ' imagens';
}

function renderPrompts(prompts) {
  var el = document.getElementById('prompts-list');
  if(!el) return;
  var html = '';
  prompts.forEach(function(p, i) {
    html += '<div class="prompt-item">'
      + '<span class="prompt-num">' + (i+1) + '</span>'
      + '<div style="flex:1">'
      + '<textarea class="prompt-ta" id="pt'+i+'">' + esc(p) + '</textarea>'
      + '<button class="regen-btn" onclick="regenPrompt('+i+')">↻ Regenerar</button>'
      + '</div></div>';
  });
  el.innerHTML = html;
}

function renderGrid(total) {
  var grid = document.getElementById('image-grid');
  if(!grid) return;
  var html = '';
  for(var i=0;i<total;i++) {
    html += '<div class="img-cell" id="cell'+i+'"><img id="img-'+i+'"></div>';
  }
  grid.innerHTML = html;
}

async function gerarPrompts() {
  var script = (document.getElementById('script-final')||{}).value || '';
  if(!script.trim()) { alert('Cole o script primeiro'); return; }
  setBtnLoading('btn-prompts', true, '1. Gerar Prompts de Imagem', 'Gerando...');
  var palavras = script.trim().split(/\s+/).length;
  var duracao_s = Math.round(palavras * 0.45);
  var n_prompts = Math.max(Math.round(duracao_s / 2), 5);
  try {
    var r = await fetch('/gerar-prompts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({script:script, modelo:state.modelo, formato:state.formato, n_prompts:n_prompts, duracao:String(duracao_s)})
    });
    var d = await r.json();

    document.getElementById('section-prompts').style.display = 'block';

    salvarEstado();
  } catch(e) { alert('Erro ao gerar prompts: ' + e.message); }

async function regenPrompt(i) {

async function gerarNarracao() {

async function gerarImagens() {
  state.prompts.forEach(function(p,i){ var ta=document.getElementById('pt'+i); if(ta) state.prompts[i]=ta.value; });
  if(!state.prompts.length){ alert('Gere os prompts primeiro'); return; }

  document.getElementById('steps-card').style.display = 'block';
  document.getElementById('btn-imagens').disabled = true;
  setP(5); setStep(1,'active','Iniciando geração...'); setStep(2,'','Aguardando...'); setStep(3,'','Aguardando...');

  try {
    // Inicia geração em background — retorna imediatamente com session_id
    var r = await fetch('/imagens-gerar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        prompts: state.prompts,
        narracao_session_id: state.narracao_session_id || '',
        formato: state.formato,
        modelo: state.modelo
      })
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);

    var imgSid = d.session_id;
    var total = d.total;
    state.sessionId = imgSid;

    // Prepara grid vazia
    renderGrid(total);
    document.getElementById('section-imagens').style.display = 'block';

    // Polling a cada 5s até concluir
    var imgsJaMostradas = {};
    await new Promise(function(resolve, reject) {
      var intervalo = setInterval(async function() {
        try {
          var rs = await fetch('/imagens-status/' + imgSid);
          var st = await rs.json();
          if(st.erro) { clearInterval(intervalo); reject(new Error(st.erro)); return; }

          var pct = Math.round(5 + (st.imagens_ok / Math.max(st.total, 1)) * 60);
          setP(pct);
          setStep(1, 'active', st.imagens_ok + '/' + st.total + ' imagens geradas...');

          // Mostra imagens conforme chegam
          for(var i = 0; i < st.imagens_ok; i++) {
            if(!imgsJaMostradas[i]) {
              var img = document.getElementById('img-'+i);
              if(img) { img.src = '/imagem/'+imgSid+'/'+i+'?t='+Date.now(); img.style.display = 'block'; }
              imgsJaMostradas[i] = true;
            }
          }

          if(st.status === 'concluido') {
            clearInterval(intervalo);
            // Mostra imagens restantes que possam ter chegado no último ciclo
            for(var j = 0; j < st.total; j++) {
              if(!imgsJaMostradas[j]) {
                var img2 = document.getElementById('img-'+j);
                if(img2) { img2.src = '/imagem/'+imgSid+'/'+j+'?t='+Date.now(); img2.style.display = 'block'; }
              }
            }
            resolve(st);
          }
        } catch(err) {
          clearInterval(intervalo);
          reject(err);
        }
      }, 5000);
    }).then(function(st) {
      var nOk = st.imagens_ok;
      setStep(1, 'done', nOk + '/' + st.total + ' imagens geradas' + (st.erros.length ? ' (' + st.erros.length + ' erros)' : ''));
      setP(75);
      setStep(2, 'done', 'Narração reutilizada');
      setP(90);
      setStep(3, 'done', 'Pronto!');
      setP(100);
      state.zipPath = st.zip;
      document.getElementById('btn-download').style.display = 'block';
      salvarEstado();
    });

  } catch(e) { alert('Erro ao gerar imagens: ' + e.message); }
  document.getElementById('btn-imagens').disabled = false;
}


function baixarZip() {
  if(state.sessionId) window.open('/download?session_id='+state.sessionId);
  else if(state.zipPath) window.open('/download?file='+encodeURIComponent(state.zipPath));
  else alert('ZIP ainda não disponível.');
}

function salvarEstado() {
  try { localStorage.setItem('yt_v2', JSON.stringify(state)); } catch(e){}
}

function restaurarEstado() {
  try {
    var s = JSON.parse(localStorage.getItem('yt_v2')||'null');
    if(!s) return;
    if(s.modelo) selModel(s.modelo);
    if(s.formato) selChip('formato', s.formato);
    if(s.prompts && s.prompts.length) {
      state.prompts = s.prompts;
      renderPrompts(s.prompts);
      document.getElementById('section-prompts').style.display = 'block';
      var bi = document.getElementById('btn-imagens');
      if(bi) bi.disabled = false;
    }
    if(s.sessionId) state.sessionId = s.sessionId;
    if(s.narracao_session_id) state.narracao_session_id = s.narracao_session_id;
    if(s.zipPath) {
      state.zipPath = s.zipPath;
      document.getElementById('btn-download').style.display = 'block';
      document.getElementById('result-card').style.display = 'block';
    }
  } catch(e) { console.log('restaurar:', e); }
}

async function comCarregarConfig() {
  try {
    var r = await fetch('/comercial-config');
    var d = await r.json();

    // Estilos
    var eg = document.getElementById('estilo-grid');
    if(eg && d.estilos) {
      eg.innerHTML = d.estilos.map(function(e) {
        return '<button class="estilo-card' + (e.id===comState.estilo?' sel':'') + '" id="estilo-'+e.id+'" onclick="comSelEstilo(\'' + e.id + '\')">' + '<div class="estilo-nome">'+e.nome+'</div>' + '<div class="estilo-desc">'+e.desc+'</div>' + '</button>';
      }).join('');
    }

    // Vozes
    var vr = document.getElementById('voz-row');
    if(vr && d.vozes) {
      vr.innerHTML = d.vozes.map(function(v) {
        return '<button class="voz-chip' + (v.id===comState.voz_id?' sel':'') + '" id="voz-'+v.id+'" onclick="comSelVoz(\'' + v.id + '\')">' + v.nome + '</button>';

function comSelVoz(id) {

async function comGerarRoteiro() {
  var titulo   = (document.getElementById('com-titulo')||{}).value||'';
  var segmento = (document.getElementById('com-segmento')||{}).value||'';
  var descricao= (document.getElementById('com-descricao')||{}).value||'';
  if(!titulo.trim() || !segmento.trim()) { alert('Preencha o título e o segmento'); return; }

  document.getElementById('btn-com-roteiro').disabled = true;
  comStatus('Gerando roteiro com Claude...');

  try {
    var r = await fetch('/comercial-roteiro', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({titulo: titulo, segmento: segmento, descricao: descricao, estilo: comState.estilo, n_cenas: 6})
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);

    comState.cenas = d.cenas || [];
    comState.n_cenas = comState.cenas.length;
    comState.session_id = d.session_id; // vem do backend

    comRenderCenas(comState.cenas);

    comStatus('Erro: ' + e.message);

  document.getElementById('btn-com-roteiro').disabled = false;
}

async function comGerarImagem(idx) {
  var prompt = (document.getElementById('cena-prompt-'+idx)||{}).value||'';
  if(!prompt.trim()) { alert('Sem prompt para a cena '+( idx+1)); return; }

  var btn = document.getElementById('cena-btn-img-'+idx);
  if(btn) { btn.disabled = true; btn.textContent = '⏳ Gerando...'; }
  comStatus('Gerando imagem da cena '+(idx+1)+'...');

  try {
    var r = await fetch('/comercial-imagem', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: prompt, estilo: comState.estilo, session_id: comState.session_id, cena_idx: idx})
    });
    var d = await r.json();
    if(!d.ok) throw new Error(d.erro);

    var img = document.getElementById('cena-img-'+idx);
    var box = document.getElementById('cena-img-box-'+idx);
    if(img) { img.src = d.url + '?t=' + Date.now(); img.style.display = 'block'; }
    if(box) box.querySelector('.cena-img-placeholder') && (box.querySelector('.cena-img-placeholder').style.display = 'none');

    // Habilita botao de video
    var btnV = document.getElementById('cena-btn-video-'+idx);
    if(btnV) btnV.disabled = false;
    comStatus('Imagem da cena '+(idx+1)+' gerada!');
  } catch(e) {
    comStatus('Erro imagem '+(idx+1)+': ' + e.message);
    if(!comState._erros) comState._erros = [];
    comState._erros.push('Imagem cena '+(idx+1));
  }
  if(btn) { btn.disabled = false; btn.textContent = '🎨 Regenerar Imagem'; }
}

async function comGerarVideo(idx) {
  var cmd       = (document.getElementById('cena-cmd-'+idx)||{}).value||'';
  var promptImg = (document.getElementById('cena-prompt-'+idx)||{}).value||'';

  var btn = document.getElementById('cena-btn-video-'+idx);
  if(btn) { btn.disabled = true; btn.textContent = '⏳ Iniciando...'; }
  comStatus('Iniciando vídeo da cena '+(idx+1)+'...');

  try {
    // Inicia geracao
    var r = await fetch('/comercial-video-iniciar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: comState.session_id, cena_idx: idx, comando: cmd, prompt_imagem: promptImg})
    });
    var d = await r.json();
    if(!d.ok) throw new Error(d.erro);

    var request_id = d.request_id;
    if(btn) btn.textContent = '⏳ Gerando vídeo...';

    // Polling
    var video_url = await new Promise(function(resolve, reject) {
      var count = 0;
      var intervalo = setInterval(async function() {
        count++;
        if(count > 60) { clearInterval(intervalo); reject(new Error('Timeout')); return; }
        try {
          var rs = await fetch('/comercial-video-status/' + request_id);
          var st = await rs.json();
          comStatus('Cena '+(idx+1)+' — status: ' + st.status + ' ('+count+'s)...');
          if(st.status === 'done') {
            clearInterval(intervalo);
            resolve(st.video_url);
          } else if(st.status === 'error') {
            clearInterval(intervalo);
            reject(new Error(st.erro || 'Erro Grok'));
          }
        } catch(e) { clearInterval(intervalo); reject(e); }
      }, 5000);
    });

    // Baixa e salva
    await fetch('/comercial-video-baixar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: comState.session_id, cena_idx: idx, video_url: video_url})
    });

    // Mostra video
    var video = document.getElementById('cena-video-'+idx);
    var box   = document.getElementById('cena-video-box-'+idx);
    if(video) { video.src = video_url; video.style.display = 'block'; }
    if(box && box.querySelector('.cena-video-placeholder')) box.querySelector('.cena-video-placeholder').style.display = 'none';
    comStatus('Vídeo da cena '+(idx+1)+' pronto!');

  } catch(e) {
    comStatus('Erro vídeo '+(idx+1)+': ' + e.message);
    if(!comState._erros) comState._erros = [];
    comState._erros.push('Vídeo cena '+(idx+1));
  }
  if(btn) { btn.disabled = false; btn.textContent = '🎬 Regenerar Vídeo'; }
}

async function comGerarTudo() {
  document.getElementById('btn-com-tudo').disabled = true;
  comState._erros = [];
  comStatus('Iniciando geração...');

  // Atualiza cenas com valores editados
  comState.cenas.forEach(function(c, i) {
    c.narracao        = (document.getElementById('cena-narracao-'+i)||{}).value || c.narracao;
    c.descricao_visual= (document.getElementById('cena-desc-'+i)||{}).value || c.descricao_visual;
    c.prompt_imagem   = (document.getElementById('cena-prompt-'+i)||{}).value || c.prompt_imagem;
    c.comando_video   = (document.getElementById('cena-cmd-'+i)||{}).value || c.comando_video;
  });

  // Gera narração primeiro
  comStatus('Gerando narração...');
  await comGerarNarracao();

  // Gera imagens em sequencia
  for(var i = 0; i < comState.cenas.length; i++) {
    await comGerarImagem(i);
  }

  // Gera videos em sequencia
  for(var j = 0; j < comState.cenas.length; j++) {
    await comGerarVideo(j);
  }

  var erros = comState._erros || [];
  if(erros.length > 0) {
    comStatus('⚠️ Concluído com ' + erros.length + ' erro(s). Verifique as cenas: ' + erros.join(', '));
  } else {
    comStatus('✅ Tudo gerado com sucesso!');
  }
  document.getElementById('btn-com-download').style.display = 'block';
  document.getElementById('btn-com-tudo').disabled = false;
}
