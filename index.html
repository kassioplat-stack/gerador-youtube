<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador YouTube</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#ccc;font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
.container{max-width:480px;margin:0 auto;padding:16px}
h1{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;letter-spacing:.5px}
.card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:14px;margin-bottom:12px}
.slbl{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:8px}
.btn{width:100%;background:#E8593C;border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:not(:disabled):hover{opacity:.88}
.btn-sec{background:#1a1a1a;border:1px solid #2a2a2a;color:#888}
textarea{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:10px;font-size:13px;color:#ccc;font-family:inherit;resize:vertical;min-height:160px;line-height:1.5}
textarea:focus{outline:none;border-color:#E8593C}
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.model-card{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;padding:12px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.model-card.sel{border-color:#E8593C;background:#1a0a08}
.model-card.sel .mc-name{color:#E8593C}
.mc-icon{font-size:20px;margin-bottom:4px}
.mc-name{font-size:12px;font-weight:600;color:#ccc}
.mc-desc{font-size:11px;color:#444;margin-top:2px}
.chips-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:5px 12px;font-size:12px;color:#666;cursor:pointer;font-family:inherit;transition:all .15s}
.chip.sel{border-color:#E8593C;color:#E8593C;background:#1a0a08}
.prompt-item{display:flex;gap:8px;margin-bottom:10px}
.prompt-num{background:#E8593C;color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;flex-shrink:0;height:fit-content;margin-top:4px}
.prompt-ta{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;padding:8px;font-size:12px;color:#ccc;font-family:inherit;resize:none;height:56px}
.prompt-ta:focus{outline:none;border-color:#444}
.regen-btn{background:transparent;border:1px solid #2a2a2a;border-radius:4px;padding:2px 8px;font-size:11px;color:#555;cursor:pointer;font-family:inherit;margin-top:3px}
.regen-btn:hover{border-color:#E8593C;color:#E8593C}
.step-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #0f0f0f}
.step-item:last-child{border-bottom:none}
.step-dot{width:22px;height:22px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#555;flex-shrink:0;font-weight:700}
.step-dot.active{background:#E8593C;color:#fff}
.step-dot.done{background:#4caf50;color:#fff}
.step-dot.error{background:#f44336;color:#fff}
.step-label{font-size:12px;color:#ccc}
.step-msg{font-size:11px;color:#555;margin-top:1px}
.prog-bar{height:4px;background:#1a1a1a;border-radius:2px;margin-bottom:14px}
.prog-fill{height:100%;width:0%;background:#E8593C;border-radius:2px;transition:width .4s}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.img-cell{aspect-ratio:9/16;background:#1a1a1a;border-radius:6px;overflow:hidden}
.img-cell img{width:100%;height:100%;object-fit:cover;display:none}
.tab-row{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:8px;font-size:12px;color:#666;cursor:pointer;font-family:inherit}
.tab-btn.sel{background:#1a0a08;border-color:#E8593C;color:#E8593C}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ Gerador YouTube</h1>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab-btn sel" id="tab-btn-gerar" onclick="showTab('gerar')">Gerar</button>
    <button class="tab-btn" id="tab-btn-thumb" onclick="showTab('thumb')">Thumbnail</button>
  </div>

  <!-- ABA GERAR -->
  <div id="tab-gerar">

    <!-- Modelo -->
    <div class="card">
      <span class="slbl">Modelo de conteúdo</span>
      <div class="model-grid">
        <button class="model-card sel" id="m-animais" onclick="selModel('animais')">
          <div class="mc-icon">🐾</div>
          <div class="mc-name">Animal</div>
          <div class="mc-desc">Field journal naturalista</div>
        </button>
        <button class="model-card" id="m-mente" onclick="selModel('mente')">
          <div class="mc-icon">🧠</div>
          <div class="mc-name">Mente</div>
          <div class="mc-desc">Personagem azul 3D</div>
        </button>
      </div>
    </div>

    <!-- Formato -->
    <div class="card">
      <span class="slbl">Formato</span>
      <div class="chips-row">
        <button class="chip sel" id="f916" onclick="selChip('formato','9:16')">9:16</button>
        <button class="chip" id="f169" onclick="selChip('formato','16:9')">16:9</button>
        <button class="chip" id="f11" onclick="selChip('formato','1:1')">1:1</button>
      </div>
    </div>

    <!-- Script -->
    <div class="card">
      <div class="info-row">
        <span class="slbl" style="margin:0">Script de narração</span>
        <span id="char-count" style="font-size:11px;color:#555">0 palavras</span>
      </div>
      <textarea id="script-final" placeholder="Cole aqui o script completo da narração..." oninput="atualizarContador()"></textarea>
    </div>

    <!-- Btn Prompts -->
    <button class="btn" id="btn-prompts" onclick="gerarPrompts()" style="margin-bottom:12px">1. Gerar Prompts de Imagem</button>

    <!-- Prompts -->
    <div id="section-prompts" style="display:none">
      <div class="card">
        <span class="slbl">Prompts de imagem</span>
        <div id="prompts-list"></div>
      </div>
      <button class="btn" id="btn-narracao" onclick="gerarNarracao()" style="margin-bottom:12px" disabled>2. Gerar Narração</button>
      <button class="btn" id="btn-imagens" onclick="gerarImagens()" style="margin-bottom:12px" disabled>3. Gerar Imagens + ZIP</button>
    </div>

    <!-- Steps -->
    <div id="steps-card" class="card" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="progress"></div></div>
      <div class="step-item">
        <div class="step-dot" id="s1">1</div>
        <div><div class="step-label">Narração - ElevenLabs</div><div class="step-msg" id="msg1">Aguardando...</div></div>
      </div>
      <div class="step-item">
        <div class="step-dot" id="s2">2</div>
        <div><div class="step-label">Imagens - Leonardo</div><div class="step-msg" id="msg2">Aguardando...</div></div>
      </div>
      <div class="step-item">
        <div class="step-dot" id="s3">3</div>
        <div><div class="step-label">ZIP</div><div class="step-msg" id="msg3">Aguardando...</div></div>
      </div>
    </div>

    <!-- Resultado -->
    <div id="result-card" style="display:none">
      <div id="section-narracao" class="card" style="display:none;margin-bottom:12px">
        <span class="slbl">Narração gerada</span>
        <audio id="audio-player" controls style="width:100%;margin-top:6px"></audio>
      </div>
      <div id="section-imagens" class="card" style="display:none;margin-bottom:12px">
        <span class="slbl">Imagens geradas</span>
        <div class="img-grid" id="image-grid"></div>
      </div>
      <button class="btn" id="btn-download" onclick="baixarZip()" style="display:none;margin-bottom:12px">⬇ Baixar Projeto (ZIP)</button>
    </div>

    <!-- Novo vídeo -->
    <div style="text-align:center;margin-top:8px">
      <button onclick="novoVideo()" style="background:transparent;border:1px solid #2a2a2a;border-radius:8px;padding:8px 20px;font-size:12px;color:#555;cursor:pointer;font-family:inherit">+ Novo Vídeo</button>
    </div>

  </div><!-- /tab-gerar -->

  <!-- ABA THUMBNAIL -->
  <div id="tab-thumb" style="display:none">
    <div class="card">
      <span class="slbl">Avaliar Thumbnail</span>
      <p style="font-size:12px;color:#555;margin-top:4px">Em breve</p>
    </div>
  </div>

</div><!-- /container -->

<script>
var state = {
  modelo: 'animais',
  formato: '9:16',
  prompts: [],
  sessionId: null,
  narracao_session_id: null,
  zipPath: null
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTab(tab) {
  document.getElementById('tab-gerar').style.display = tab==='gerar' ? 'block' : 'none';
  document.getElementById('tab-thumb').style.display = tab==='thumb' ? 'block' : 'none';
  document.getElementById('tab-btn-gerar').classList.toggle('sel', tab==='gerar');
  document.getElementById('tab-btn-thumb').classList.toggle('sel', tab==='thumb');
}

function selModel(val) {
  state.modelo = val;
  ['animais','mente'].forEach(function(m){
    document.getElementById('m-'+m).classList.toggle('sel', m===val);
  });
  salvarEstado();
}

function selChip(key, val) {
  state[key] = val;
  var map = {'9:16':'f916','16:9':'f169','1:1':'f11'};
  Object.values(map).forEach(function(id){ var el=document.getElementById(id); if(el) el.classList.remove('sel'); });
  var selId = map[val];
  if(selId) { var el=document.getElementById(selId); if(el) el.classList.add('sel'); }
  salvarEstado();
}

function setBtnLoading(id, loading, normalText, loadingText) {
  var btn = document.getElementById(id);
  if(!btn) return;
  btn.disabled = loading;
  btn.textContent = loading ? (loadingText||'Aguardando...') : normalText;
}

function setStep(n, status, msg) {
  var dot = document.getElementById('s'+n);
  var msgEl = document.getElementById('msg'+n);
  if(dot) {
    dot.className = 'step-dot' + (status==='done' ? ' done' : status==='active' ? ' active' : status==='error' ? ' error' : '');
    dot.textContent = status==='done' ? '✓' : String(n);
  }
  if(msgEl && msg) msgEl.textContent = msg;
}

function setP(pct) {
  var el = document.getElementById('progress');
  if(el) el.style.width = pct + '%';
}

function atualizarContador() {
  var sf = document.getElementById('script-final');
  var cc = document.getElementById('char-count');
  if(!sf || !cc) return;
  var txt = sf.value.trim();
  var palavras = txt ? txt.split(/\s+/).length : 0;
  var duracao_s = Math.round(palavras * 0.45);
  var n = Math.max(Math.round(duracao_s / 2), 0);
  cc.textContent = palavras + ' palavras · ~' + duracao_s + 's · ' + n + ' imagens';
}

function renderPrompts(prompts) {
  var el = document.getElementById('prompts-list');
  if(!el) return;
  var html = '';
  prompts.forEach(function(p, i) {
    html += '<div class="prompt-item">'
      + '<span class="prompt-num">' + (i+1) + '</span>'
      + '<div style="flex:1">'
      + '<textarea class="prompt-ta" id="pt'+i+'">' + esc(p) + '</textarea>'
      + '<button class="regen-btn" onclick="regenPrompt('+i+')">↻ Regenerar</button>'
      + '</div></div>';
  });
  el.innerHTML = html;
}

function renderGrid(total) {
  var grid = document.getElementById('image-grid');
  if(!grid || grid.children.length) return;
  var html = '';
  for(var i=0;i<total;i++) {
    html += '<div class="img-cell" id="cell'+i+'"><img id="img-'+i+'"></div>';
  }
  grid.innerHTML = html;
}

async function gerarPrompts() {
  var script = (document.getElementById('script-final')||{}).value || '';
  if(!script.trim()) { alert('Cole o script primeiro'); return; }
  setBtnLoading('btn-prompts', true, '1. Gerar Prompts de Imagem', 'Gerando...');
  var palavras = script.trim().split(/\s+/).length;
  var duracao_s = Math.round(palavras * 0.45);
  var n_prompts = Math.max(Math.round(duracao_s / 2), 5);
  try {
    var r = await fetch('/gerar-prompts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({script:script, modelo:state.modelo, formato:state.formato, n_prompts:n_prompts, duracao:String(duracao_s)})
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);
    state.prompts = d.prompts || [];
    renderPrompts(state.prompts);
    document.getElementById('section-prompts').style.display = 'block';
    var bi = document.getElementById('btn-imagens');
    if(bi) { bi.disabled = false; }
    var bn = document.getElementById('btn-narracao');
    if(bn) { bn.disabled = false; }
    salvarEstado();
  } catch(e) { alert('Erro ao gerar prompts: ' + e.message); }
  setBtnLoading('btn-prompts', false, '1. Gerar Prompts de Imagem');
}

async function regenPrompt(i) {
  var ta = document.getElementById('pt'+i);
  if(!ta) return;
  ta.disabled = true;
  try {
    var r = await fetch('/regenerar-prompt', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt_atual: ta.value, modelo: state.modelo})
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);
    ta.value = d.prompt;
    state.prompts[i] = d.prompt;
    salvarEstado();
  } catch(e) { alert('Erro: ' + e.message); }
  ta.disabled = false;
}

async function gerarNarracao() {
  var script = (document.getElementById('script-final')||{}).value || '';
  if(!script.trim()) { alert('Cole o script primeiro'); return; }
  setBtnLoading('btn-narracao', true, '2. Gerar Narração', 'Gerando narração...');
  document.getElementById('steps-card').style.display = 'block';
  setStep(1,'active','Gerando com ElevenLabs...'); setStep(2,'','Aguardando...'); setStep(3,'','Aguardando...');
  setP(10);
  try {
    var r = await fetch('/gerar-audio', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({narracao: script, modelo: state.modelo})
    });
    var d = await r.json();
    if(d.erro) throw new Error(d.erro);
    if(d.session_id) state.narracao_session_id = d.session_id;
    var ap = document.getElementById('audio-player');
    if(ap && d.session_id) ap.src = '/audio/'+d.session_id+'?t='+Date.now();
    document.getElementById('section-narracao').style.display = 'block';
    document.getElementById('result-card').style.display = 'block';
    setStep(1,'done','Narração gerada!');
    setP(33);
    salvarEstado();
  } catch(e) {
    setStep(1,'error','Erro: ' + e.message);
    alert('Erro ao gerar narração: ' + e.message);
  }
  setBtnLoading('btn-narracao', false, '2. Gerar Narração');
}

async function gerarImagens() {
  // Captura edições nos prompts
  state.prompts.forEach(function(p,i){ var ta=document.getElementById('pt'+i); if(ta) state.prompts[i]=ta.value; });
  var script = (document.getElementById('script-final')||{}).value || '';
  document.getElementById('steps-card').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('btn-imagens').disabled = true;
  setP(5); setStep(1,'',''); setStep(2,'active','Iniciando Leonardo...'); setStep(3,'','Aguardando...');
  try {
    var resp = await fetch('/narracao', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        narracao_custom: script,
        narracao_session_id: state.narracao_session_id || null,
        prompts_custom: state.prompts,
        modelo: state.modelo,
        estilo: 'field_journal',
        formato: state.formato,
        skip_audio: true
      })
    });
    var reader = resp.body.getReader();
    var dec = new TextDecoder();
    var buf = '';
    while(true) {
      var res = await reader.read();
      if(res.done) break;
      buf += dec.decode(res.value, {stream:true});
      var lines = buf.split('\n'); buf = lines.pop();
      lines.forEach(function(line) {
        line = line.trim();
        if(line.indexOf('data:') !== 0) return;
        try {
          var d = JSON.parse(line.slice(5));
          if(d.step) setStep(d.step, d.status, d.msg);
          if(d.progress !== undefined) setP(d.progress);
          if(d.session_id) state.sessionId = d.session_id;
          if(d.img_idx !== undefined) {
            var img = document.getElementById('img-'+d.img_idx);
            if(img) { img.src = '/imagem/'+state.sessionId+'/'+d.img_idx+'?t='+Date.now(); img.style.display='block'; }
          }
          if(d.imgs_total) {
            renderGrid(d.imgs_total);
            document.getElementById('section-imagens').style.display = 'block';
            document.getElementById('result-card').style.display = 'block';
          }
          if(d.audio_ok || d.narracao_ok) {
            var ap = document.getElementById('audio-player');
            if(ap && state.sessionId) ap.src = '/audio/'+state.sessionId+'?t='+Date.now();
            document.getElementById('section-narracao').style.display = 'block';
            document.getElementById('result-card').style.display = 'block';
          }
          if(d.zip || d.done) {
            if(d.zip) state.zipPath = d.zip;
            document.getElementById('btn-download').style.display = 'block';
            document.getElementById('result-card').style.display = 'block';
            salvarEstado();
          }
        } catch(ex) { console.log('SSE parse:', line); }
      });
    }
  } catch(e) { alert('Erro ao gerar imagens: ' + e.message); }
  document.getElementById('btn-imagens').disabled = false;
}

function baixarZip() {
  if(state.sessionId) window.open('/download?session_id='+state.sessionId);
}

function salvarEstado() {
  try { localStorage.setItem('yt_v2', JSON.stringify(state)); } catch(e){}
}

function restaurarEstado() {
  try {
    var s = JSON.parse(localStorage.getItem('yt_v2')||'null');
    if(!s) return;
    if(s.modelo) selModel(s.modelo);
    if(s.formato) selChip('formato', s.formato);
    if(s.prompts && s.prompts.length) {
      state.prompts = s.prompts;
      renderPrompts(s.prompts);
      document.getElementById('section-prompts').style.display = 'block';
      var bi = document.getElementById('btn-imagens');
      if(bi) bi.disabled = false;
      var bn = document.getElementById('btn-narracao');
      if(bn) bn.disabled = false;
    }
    if(s.sessionId) state.sessionId = s.sessionId;
    if(s.narracao_session_id) state.narracao_session_id = s.narracao_session_id;
    if(s.zipPath) {
      state.zipPath = s.zipPath;
      document.getElementById('btn-download').style.display = 'block';
      document.getElementById('result-card').style.display = 'block';
    }
  } catch(e) { console.log('restaurar:', e); }
}

function novoVideo() {
  if(!confirm('Iniciar novo vídeo? O progresso atual será perdido.')) return;
  localStorage.removeItem('yt_v2');
  state = {modelo:'animais', formato:'9:16', prompts:[], sessionId:null, narracao_session_id:null, zipPath:null};
  document.getElementById('script-final').value = '';
  document.getElementById('section-prompts').style.display = 'none';
  document.getElementById('steps-card').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('btn-download').style.display = 'none';
  document.getElementById('image-grid').innerHTML = '';
  atualizarContador();
  selModel('animais');
  selChip('formato','9:16');
}

document.addEventListener('DOMContentLoaded', function() {
  restaurarEstado();
  atualizarContador();
});
</script>
</body>
</html>
